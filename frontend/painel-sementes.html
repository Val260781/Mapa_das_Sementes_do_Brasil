<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sementes Cadastradas — Mapa das Sementes do Brasil</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .filtros-barra {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin: 1.5rem 0;
      align-items: center;
    }
    .filtros-barra select,
    .filtros-barra input {
      width: auto;
      min-width: 160px;
    }
    .registro-card {
      background: var(--branco);
      border-radius: var(--raio-lg);
      box-shadow: var(--sombra);
      padding: 1.2rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .registro-card__foto {
      width: 100px;
      height: 100px;
      border-radius: var(--raio);
      object-fit: cover;
      background: var(--terra-escura);
      flex-shrink: 0;
    }
    .registro-card__corpo {
      flex: 1;
      min-width: 200px;
    }
    .registro-card__titulo {
      font-weight: 700;
      color: var(--verde-escuro);
      font-size: 1.05rem;
    }
    .registro-card__cientifico {
      font-style: italic;
      color: var(--texto-suave);
      font-size: 0.85rem;
    }
    .registro-card__meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: var(--texto-suave);
    }
    .badge-status {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .badge-status--pendente { background: #fff3cd; color: #8a6500; }
    .badge-status--aprovado { background: var(--verde-suave); color: var(--verde-escuro); }
    .badge-status--rejeitado { background: #fdecea; color: var(--erro); }
    .registro-card__acoes {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      justify-content: center;
    }
    .btn-mini {
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: var(--raio);
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-mini--aprovar { background: var(--verde-claro); color: var(--branco); }
    .btn-mini--rejeitar { background: #fdecea; color: var(--erro); }
    .btn-mini--excluir { background: var(--terra-escura); color: var(--texto); }
    .abas {
      display: flex;
      gap: 0.5rem;
      border-bottom: 2px solid var(--terra-escura);
      margin-bottom: 1.5rem;
    }
    .aba {
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      color: var(--texto-suave);
      font-weight: 600;
      font-size: 0.9rem;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .aba.ativa {
      color: var(--verde-escuro);
      border-bottom-color: var(--verde-escuro);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="navbar__logo" href="/frontend/index.html">
      🌱 <span>Mapa das Sementes</span> do Brasil
    </a>
    <ul class="navbar__nav">
      <li><a href="/frontend/index.html">Início</a></li>
      <li><a href="/frontend/cadastro-semente.html">Cadastrar semente</a></li>
      <li><a href="#" id="link-sair">Sair</a></li>
    </ul>
  </nav>

  <div class="container" style="padding-top: 2rem; padding-bottom: 3rem;">

    <h1 style="color: var(--verde-escuro); font-size: 1.6rem;">
      🌳 Sementes cadastradas
    </h1>
    <p style="color: var(--texto-suave); margin-top: 0.3rem;" id="subtitulo-papel">
      Acompanhe os registros de sementes da plataforma.
    </p>

    <!-- Abas de status -->
    <div class="abas">
      <div class="aba ativa" data-status="todos">Todos</div>
      <div class="aba" data-status="pendente">Pendentes</div>
      <div class="aba" data-status="aprovado">Aprovados</div>
      <div class="aba" data-status="rejeitado">Rejeitados</div>
    </div>

    <div class="filtros-barra">
      <input type="text" id="busca" placeholder="🔍 Buscar por espécie, semente ou local..." style="flex: 1; min-width: 220px;" />
      <div class="admin-resumo" id="resumo-total" style="color: var(--texto-suave); font-size: 0.9rem;"></div>
    </div>

    <div id="lista-wrapper">
      <div class="estado-carregando" style="text-align:center; padding: 3rem; color: var(--texto-suave);">
        Carregando registros...
      </div>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script>
    exigirLogin();

    document.getElementById('link-sair').addEventListener('click', (e) => {
      e.preventDefault();
      encerrarSessao();
    });

    const usuario = obterUsuario();
    const ehAdmin = usuario?.role === 'admin';
    const ehEspecialista = usuario?.role === 'especialista' || ehAdmin;

    document.getElementById('subtitulo-papel').textContent = ehEspecialista
      ? 'Valide ou rejeite os registros enviados pela comunidade.'
      : 'Acompanhe os registros de sementes da plataforma.';

    let todosRegistros = [];
    let statusAtivo = 'todos';

    document.addEventListener('DOMContentLoaded', carregarRegistros);

    document.querySelectorAll('.aba').forEach(aba => {
      aba.addEventListener('click', () => {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        aba.classList.add('ativa');
        statusAtivo = aba.dataset.status;
        renderizarLista();
      });
    });

    document.getElementById('busca').addEventListener('input', renderizarLista);

    async function carregarRegistros() {
      const wrapper = document.getElementById('lista-wrapper');
      try {
        const resposta = await apiListarRegistros();
        const dados = resposta.data || resposta;
        todosRegistros = dados.registros || dados || [];
        renderizarLista();
      } catch (err) {
        wrapper.innerHTML = `<div style="text-align:center; padding: 3rem; color: var(--erro);">⚠️ Erro ao carregar registros: ${err.message}</div>`;
      }
    }

    function renderizarLista() {
      const wrapper = document.getElementById('lista-wrapper');
      const termoBusca = document.getElementById('busca').value.trim().toLowerCase();

      let filtrados = todosRegistros;

      if (statusAtivo !== 'todos') {
        filtrados = filtrados.filter(r => (r.status || '').toLowerCase() === statusAtivo);
      }

      if (termoBusca) {
        filtrados = filtrados.filter(r => {
          const especie = (r.semente?.especie?.nome_popular || '').toLowerCase();
          const semente = (r.semente?.nome || '').toLowerCase();
          const local = `${r.municipio || ''} ${r.estado || ''}`.toLowerCase();
          return especie.includes(termoBusca) || semente.includes(termoBusca) || local.includes(termoBusca);
        });
      }

      document.getElementById('resumo-total').textContent =
        `${filtrados.length} de ${todosRegistros.length} registro${todosRegistros.length !== 1 ? 's' : ''}`;

      if (filtrados.length === 0) {
        wrapper.innerHTML = `<div style="text-align:center; padding: 3rem; color: var(--texto-suave);">Nenhum registro encontrado.</div>`;
        return;
      }

      wrapper.innerHTML = filtrados.map(r => renderizarCard(r)).join('');

      wrapper.querySelectorAll('.btn-mini--aprovar').forEach(btn => {
        btn.addEventListener('click', () => acaoRegistro(btn.dataset.id, 'aprovar'));
      });
      wrapper.querySelectorAll('.btn-mini--rejeitar').forEach(btn => {
        btn.addEventListener('click', () => acaoRegistro(btn.dataset.id, 'rejeitar'));
      });
      wrapper.querySelectorAll('.btn-mini--excluir').forEach(btn => {
        btn.addEventListener('click', () => acaoExcluir(btn.dataset.id, btn.dataset.nome));
      });
    }

    function renderizarCard(r) {
      const especie = r.semente?.especie || {};
      const semente = r.semente || {};
      const foto = r.fotos?.[0]?.url || r.fotos?.[0]?.URL || '';
      const status = (r.status || 'pendente').toLowerCase();

      const botoesValidacao = ehEspecialista && status === 'pendente' ? `
        <button type="button" class="btn-mini btn-mini--aprovar" data-id="${r.ID || r.id}">✓ Aprovar</button>
        <button type="button" class="btn-mini btn-mini--rejeitar" data-id="${r.ID || r.id}">✕ Rejeitar</button>
      ` : '';

      const botaoExcluir = ehAdmin ? `
        <button type="button" class="btn-mini btn-mini--excluir" data-id="${r.ID || r.id}" data-nome="${escapeHtmlLocal(especie.nome_popular || semente.nome || 'este registro')}">🗑️ Excluir</button>
      ` : '';

      return `
        <div class="registro-card">
          ${foto
            ? `<img class="registro-card__foto" src="${foto}" alt="Foto de ${escapeHtmlLocal(especie.nome_popular || '')}" />`
            : `<div class="registro-card__foto" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;">🌱</div>`
          }
          <div class="registro-card__corpo">
            <div class="registro-card__titulo">${escapeHtmlLocal(especie.nome_popular || 'Espécie não informada')}</div>
            <div class="registro-card__cientifico">${escapeHtmlLocal(especie.nome_cientifico || '')}</div>
            <div class="registro-card__meta">
              <span>🌾 ${escapeHtmlLocal(semente.nome || '—')}</span>
              <span>📍 ${escapeHtmlLocal(r.municipio || '—')}${r.estado ? ' - ' + escapeHtmlLocal(r.estado) : ''}</span>
              <span class="badge-status badge-status--${status}">${formatarStatus(status)}</span>
            </div>
          </div>
          <div class="registro-card__acoes">
            ${botoesValidacao}
            ${botaoExcluir}
          </div>
        </div>
      `;
    }

    async function acaoRegistro(id, tipo) {
      try {
        if (tipo === 'aprovar') {
          await apiValidarRegistro(id);
        } else {
          await apiRejeitarRegistro(id);
        }
        await carregarRegistros();
      } catch (err) {
        alert('Erro: ' + (err.message || 'tente novamente.'));
      }
    }

    async function acaoExcluir(id, nome) {
      const confirmado = window.confirm(`Excluir o registro de "${nome}"? Esta ação é permanente.`);
      if (!confirmado) return;

      try {
        await apiAdminExcluirRegistro(id);
        await carregarRegistros();
      } catch (err) {
        alert('Erro ao excluir: ' + (err.message || 'tente novamente.'));
      }
    }

    function formatarStatus(status) {
      const mapa = { pendente: 'Pendente', aprovado: 'Aprovado', rejeitado: 'Rejeitado' };
      return mapa[status] || status;
    }

    function escapeHtmlLocal(texto) {
      const div = document.createElement('div');
      div.textContent = texto;
      return div.innerHTML;
    }
  </script>

</body>
</html>
